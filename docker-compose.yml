services:
  core:
    container_name: epds-core
    build:
      context: .
      dockerfile: Dockerfile.pds
    restart: unless-stopped
    env_file: .env
    volumes:
      - /opt/pds/data:/data
    networks:
      - epds-internal
    healthcheck:
      test:
        ['CMD', 'wget', '-q', '--spider', 'http://localhost:3000/xrpc/_health']
      interval: 30s
      timeout: 5s
      retries: 3

  auth:
    container_name: epds-auth
    build:
      context: .
      dockerfile: Dockerfile.auth
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./auth-data:/data
    networks:
      - epds-internal
    depends_on:
      core:
        condition: service_healthy

  caddy:
    container_name: epds-caddy
    image: caddy:2-alpine
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - epds-internal
    depends_on:
      - core
      - auth

  cloudflared:
    container_name: epds-cloudflared
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    networks:
      - epds-internal
    depends_on:
      - caddy

networks:
  epds-internal:
    driver: bridge

volumes:
  caddy-data:
  caddy-config:

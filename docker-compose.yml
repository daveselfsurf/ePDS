services:
  core:
    build:
      context: .
      dockerfile: Dockerfile.pds
    ports:
      - '${PDS_PORT:-3000}:3000'
    env_file: .env
    environment:
      - PDS_PORT=3000
    volumes:
      - pds-data:/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3000/health']
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s

  auth:
    build:
      context: .
      dockerfile: Dockerfile.auth
    ports:
      - '${AUTH_PORT:-3001}:3001'
    env_file: .env
    environment:
      - AUTH_PORT=3001
    volumes:
      - auth-data:/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3001/health']
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    env_file: .env
    restart: unless-stopped
    depends_on:
      core:
        condition: service_healthy
      auth:
        condition: service_healthy

  # Demo frontend (tutorial scaffold)
  demo:
    build:
      context: .
      dockerfile: Dockerfile.demo
    ports:
      - '${DEMO_PORT:-3002}:3002'
    env_file: packages/demo/.env
    environment:
      - PDS_URL=https://${PDS_HOSTNAME:-pds.example}
      - PDS_INTERNAL_URL=http://core:3000
      - AUTH_ENDPOINT=https://auth.${PDS_HOSTNAME:-pds.example}/oauth/authorize
    restart: unless-stopped
    depends_on:
      core:
        condition: service_healthy

  # Local email trap for development + e2e tests
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - '1025:1025'
      - '8025:8025'
    environment:
      # Basic-auth creds for the HTTP UI + API. E2E suite reads these via
      # E2E_MAILPIT_USER / E2E_MAILPIT_PASS. Plaintext is fine for a
      # dev-only email trap.
      - MP_UI_AUTH=${MAILPIT_USER:-admin}:${MAILPIT_PASS:-admin}
      - MP_MAX_MESSAGES=5000
    profiles:
      - dev

volumes:
  pds-data:
  auth-data:
  caddy-data:
  caddy-config:
